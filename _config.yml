# --- Site identity (edit these per-site) ----------------------------------
title:       "My Site"
description:  "a short, punchy description of this site"
author:      "Your Name"
email:        you@example.com

# Internal links/assets use `site.github.url`, which GitHub Pages auto-detects
# per repository — so a fork at user.github.io/<repo> just works with no edits.
# Leave url/baseurl blank unless you have a reason to override:
#   - url:     set to your custom domain for canonical SEO links, e.g.
#              "https://www.example.com" (only affects SEO/feed metadata).
#   - baseurl: leave "" — do NOT hardcode a repo path here, or forks break.
url:     ""
baseurl: ""

# --- Build settings (Example theme) ------------------------------------
markdown:     kramdown
highlighter:  rouge
permalink:    /:title
paginate:     5

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

# Optional feature toggles read by the theme layouts
hide_post_date:     false
hide_post_share:    false
hide_related_posts: false

# Files & folders excluded from the build output
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .sass-cache
  - .jekyll-cache
