# --- Site identity (edit these per-site) ----------------------------------
title:       "My Site"
description:  "a short, punchy description of this site"
author:      "Your Name"
email:        you@example.com

# The base hostname & protocol for the site.
url:     "https://www.timlawrence.org"
# Serving under a subpath (https://host/site-template). Set to "" if this
# site ever moves to the domain root.
baseurl: "/site-template"

# --- Build settings (Millennial theme) ------------------------------------
markdown:     kramdown
highlighter:  rouge
permalink:    /:title
paginate:     5

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

# Optional feature toggles read by the theme layouts
hide_post_date:     false
hide_post_share:    false
hide_related_posts: false

# Files & folders excluded from the build output
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .sass-cache
  - .jekyll-cache
