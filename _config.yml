# --- Site settings (edit these per-site) ---------------------------------
title: My Site
tagline: A short, punchy description of this site
description: >-
  A longer description used for SEO and social cards. Replace this with a
  sentence or two about who this site is for and what it offers.
author: Your Name
email: you@example.com

# The base hostname & protocol for the site, e.g. https://example.com
# For a GitHub Pages project site this is https://<user>.github.io
url: "https://example.com"
# If serving from a subpath (e.g. https://<user>.github.io/<repo>), set baseurl
# to "/<repo>". Leave as "" for a user/org page or custom domain.
baseurl: "/site-template"

# --- Social / contact (optional — blank values are hidden) ----------------
social:
  github:   your-username
  twitter:  ""
  linkedin: ""

# --- Build settings -------------------------------------------------------
markdown: kramdown
permalink: /blog/:year/:month/:day/:title/
timezone: America/Los_Angeles

# Pages/posts default front matter
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
    values:
      layout: default

# Files & folders excluded from the build output
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .sass-cache
  - .jekyll-cache

# Plugins (all supported by GitHub Pages)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
